<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>Нотификации - SmartAdds</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: #e5e7eb;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        a {
            color: #93c5fd;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 18px 0;
        }

        button {
            padding: 10px 14px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .notification {
            padding: 18px;
            margin-top: 14px;
            border-radius: 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .unread {
            border-color: rgba(59,130,246,0.65);
            box-shadow: 0 0 24px rgba(59,130,246,0.16);
        }

        .read {
            opacity: 0.72;
        }

        .chip {
            display: inline-block;
            margin-top: 8px;
            margin-right: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(59,130,246,0.14);
            color: #bfdbfe;
            font-size: 13px;
        }

        .section-title {
            margin-top: 28px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .empty {
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Нотификации</h1>
    <p><a href="/">Назад кон SmartAdds</a></p>

    <div id="summary"></div>

    <div class="top-actions">
        <button onclick="loadNotifications()">Освежи</button>
        <button onclick="markAllAsRead()">Означи ги сите како прочитани</button>
    </div>

    <div id="content"></div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("smartadds_user") || "null");

if (!user) {
    document.getElementById("content").innerHTML = `
        <div class="notification">Мора да се најавиш за да ги видиш нотификациите.</div>
    `;
} else {
    loadNotifications();
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text || "";
    return div.innerHTML;
}

function renderNotification(n) {
    return `
        <div class="notification ${!n.is_read ? "unread" : "read"}">
            <b>${escapeHtml(n.message)}</b>

            <h3>${escapeHtml(n.ad?.title || "Без наслов")}</h3>

            ${n.ad?.price ? `<div class="chip">Цена: ${escapeHtml(n.ad.price)}</div>` : ""}
            <div class="chip">Извор: ${escapeHtml(n.ad?.source || "unknown")}</div>

            ${n.ad?.description ? `<p>${escapeHtml(n.ad.description)}</p>` : ""}

            ${n.ad?.link ? `<a href="${n.ad.link}" target="_blank">Отвори оглас</a>` : ""}

            <br>

            ${!n.is_read ? `<button onclick="markAsRead(${n.id})">Означи како прочитано</button>` : ""}
        </div>
    `;
}

async function loadNotifications() {
    const response = await fetch(`/notifications/${user.user_id}`);
    const notifications = await response.json();

    const content = document.getElementById("content");
    const summary = document.getElementById("summary");

    if (!Array.isArray(notifications) || notifications.length === 0) {
        summary.innerHTML = "";
        content.innerHTML = `<div class="notification empty">Немаш нотификации.</div>`;
        return;
    }

    const unread = notifications.filter(n => !n.is_read);
    const read = notifications.filter(n => n.is_read);

    summary.innerHTML = `
        <h3>Имате ${unread.length} нови огласи</h3>
    `;

    let html = "";

    html += `<h2 class="section-title">Нови огласи</h2>`;

    if (unread.length === 0) {
        html += `<div class="notification empty">Нема нови нотификации.</div>`;
    } else {
        html += unread.map(renderNotification).join("");
    }

    html += `<h2 class="section-title">Прочитани</h2>`;

    if (read.length === 0) {
        html += `<div class="notification empty">Нема прочитани нотификации.</div>`;
    } else {
        html += read.map(renderNotification).join("");
    }

    content.innerHTML = html;
}

async function markAsRead(id) {
    await fetch(`/notifications/${id}/read`, {
        method: "POST"
    });

    loadNotifications();
}

async function markAllAsRead() {
    await fetch(`/notifications/read-all/${user.user_id}`, {
        method: "POST"
    });

    loadNotifications();
}
</script>
</body>
</html>
