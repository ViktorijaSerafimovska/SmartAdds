<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>Најава - SmartAdds</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: #e5e7eb;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .box {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 28px;
        }
        input, button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
        }
        input {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        button {
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        a { color: #93c5fd; }
        #msg { margin-top: 14px; color: #fca5a5; }
    </style>
</head>
<body>
<div class="box">
    <h1>Најава</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Најави се</button>

    <p>Немаш профил? <a href="/static/register.html">Регистрирај се</a></p>
    <p><a href="/">Назад кон SmartAdds</a></p>

    <div id="msg"></div>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    const response = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    });

    const data = await response.json();

    if (!response.ok) {
        msg.textContent = data.detail || "Грешка при најава.";
        return;
    }

    localStorage.setItem("smartadds_user", JSON.stringify(data));
    window.location.href = "/";
}
</script>
</body>
</html>
